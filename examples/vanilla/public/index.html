<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bunny Upload — Vanilla JS</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: system-ui, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
      h1 { margin-bottom: 8px; }
      h2 { margin-top: 32px; margin-bottom: 8px; }
      p { color: #666; margin-bottom: 24px; }

      .dropzone {
        border: 2px dashed #ccc;
        border-radius: 8px;
        padding: 40px;
        text-align: center;
        cursor: pointer;
        transition: border-color 0.2s, background 0.2s;
      }
      .dropzone:hover,
      .dropzone.active { border-color: #f60; background: #fff8f0; }

      .file-list { list-style: none; margin-top: 16px; }
      .file-list li {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 12px;
        border-bottom: 1px solid #eee;
      }
      .file-name { font-weight: 500; }
      .file-size { color: #888; font-size: 0.85em; margin-left: 8px; }
      .file-status { font-size: 0.85em; }
      .file-status.uploading { color: #f60; }
      .file-status.complete { color: #0a0; }
      .file-status.error { color: #c00; }

      .progress {
        width: 100px;
        height: 6px;
        background: #eee;
        border-radius: 3px;
        overflow: hidden;
      }
      .progress-bar {
        height: 100%;
        background: #f60;
        transition: width 0.2s;
      }

      .remove {
        background: none;
        border: none;
        cursor: pointer;
        font-size: 18px;
        color: #999;
        padding: 0 4px;
      }
      .remove:hover { color: #c00; }

      .uploaded-list { list-style: none; }
      .uploaded-list li { padding: 4px 0; }
      .uploaded-list a { color: #f60; }
    </style>
  </head>
  <body>
    <h1>Bunny Upload</h1>
    <p>Drop files below to upload them to Bunny Storage.</p>

    <div class="dropzone" id="dropzone">
      Drop files here or click to browse
    </div>

    <ul class="file-list" id="file-list"></ul>

    <div id="uploaded-section" hidden>
      <h2>Uploaded Files</h2>
      <ul class="uploaded-list" id="uploaded-list"></ul>
    </div>

    <script src="/bunny-upload.js"></script>
    <script>
      const dropzoneEl = document.getElementById("dropzone");
      const fileList = document.getElementById("file-list");
      const uploadedSection = document.getElementById("uploaded-section");
      const uploadedList = document.getElementById("uploaded-list");

      // createDropzone wires up drag-and-drop + file picker on any element
      const dropzone = BunnyUpload.createDropzone(dropzoneEl, {
        restrictions: {
          allowedTypes: ["image/*"],
          maxFileSize: "10mb",
          maxFiles: 5,
        },
        onDragOver: (isDragOver) => {
          dropzoneEl.classList.toggle("active", isDragOver);
        },
        onStateChange: (files) => {
          fileList.innerHTML = files
            .map((f) => {
              let status = "";
              if (f.status === "uploading") {
                status =
                  '<div class="progress">' +
                  '<div class="progress-bar" style="width: ' + f.progress + '%"></div>' +
                  "</div>";
              } else if (f.status === "complete") {
                status = '<span class="file-status complete">✓</span>';
              } else if (f.status === "error") {
                status = '<span class="file-status error">' + f.error + "</span>";
              }

              const remove =
                f.status === "idle" || f.status === "error"
                  ? '<button class="remove" data-id="' + f.id + '">×</button>'
                  : "";

              return (
                "<li>" +
                '<span><span class="file-name">' + f.name + "</span>" +
                '<span class="file-size">' + BunnyUpload.formatBytes(f.size) + "</span></span>" +
                status +
                remove +
                "</li>"
              );
            })
            .join("");

          // Bind remove buttons
          fileList.querySelectorAll(".remove").forEach((btn) => {
            btn.addEventListener("click", () => {
              dropzone.uploader.removeFile(btn.dataset.id);
            });
          });
        },
        onComplete: (results) => {
          uploadedSection.hidden = false;
          results.forEach((result) => {
            uploadedList.innerHTML +=
              '<li><a href="' + result.url + '" target="_blank">' + result.name + "</a></li>";
          });
        },
      });

      // Click the dropzone to open file picker
      dropzoneEl.addEventListener("click", () => dropzone.openFilePicker());
    </script>
  </body>
</html>
